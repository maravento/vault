# NetWatch - Apache Configuration
# Main interface : http://localhost:3126/
# LAN Devices    : http://localhost:3126/?tab=lan
# Watched Ports  : http://localhost:3126/?tab=ports

<VirtualHost *:3126>
    ServerName localhost
    ServerAdmin admin@localhost

    DocumentRoot /var/www/netwatch/web
    DirectoryIndex index.php

    # LAN devices tab
    Alias /lan /var/www/netwatch/web

    # Watched ports tab
    Alias /ports /var/www/netwatch/web

    <Directory /var/www/netwatch/web>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Location /lan>
        DirectoryIndex lan.html
    </Location>

    <Location /ports>
        DirectoryIndex ports.html
    </Location>

    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options SAMEORIGIN
    Header always set Referrer-Policy strict-origin-when-cross-origin
    # 'unsafe-inline' is required: index.php/lan.html/ports.html use inline
    # <script>/<style> blocks by design (no build step, no nonce infra) —
    # still same-origin only otherwise, no external script/style/frame sources.
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; object-src 'none'"

    # PHP
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    # Log
    ErrorLog ${APACHE_LOG_DIR}/netwatch_error.log
    CustomLog ${APACHE_LOG_DIR}/netwatch_access.log combined
</VirtualHost>
