# ============================================================================
# DROP RULES - Threats to block actively (alert → drop)
# ============================================================================
# Rules listed here are converted from "alert" to "drop" by suricata-update.
# Unlike disable.conf (which silences rules), drop.conf actively blocks traffic.
#
# SYNTAX:
#   #2014939  # Commented SID = Rule remains as ALERT (not dropped)
#   2014939   # Uncommented SID = Rule is converted to DROP (traffic blocked)
#
# WARNING: Only add SIDs you are confident about. A false positive here
# blocks legitimate traffic, not just generates a noisy alert.
# ============================================================================

# ============================================================================
# TOR / ANONYMIZATION NETWORKS
# ============================================================================
2014939 # ET INFO DNS Query for TOR Hidden Domain .onion Accessible Via TOR

# ============================================================================
# SUSPICIOUS TLDs
# ============================================================================
2014169 # ET DNS Query for .su TLD (Soviet Union) Often Malware Related

