<VirtualHost *:18083>
    ServerName localhost
    DocumentRoot /home/your_user/compartida
    Alias /compartida /home/your_user/compartida

    <Directory /home/your_user/compartida>
        Options Indexes FollowSymLinks
        DirectoryIndex index.html index.php
        AllowOverride None
        Require all granted

        # PDF
        <FilesMatch "\.pdf$">
            Header set Content-Disposition inline
            ForceType application/pdf
        </FilesMatch>

        # HTML
        <FilesMatch "\.html$">
            ForceType text/html
        </FilesMatch>

        # Rest
        <FilesMatch "\.(?!(html|pdf)$)[^.]+$">
            ForceType application/octet-stream
            Header set Content-Disposition attachment
        </FilesMatch>
    </Directory>
</VirtualHost>
