# SMBstack - Web Configuration
# Audit Viewer  : http://localhost:3092/audit
# Shared Folder : http://localhost:3092/shared
# Shared Files  : http://localhost:3092/shared/files/...

<VirtualHost *:3092>
    ServerName localhost
    ServerAdmin admin@localhost

    DocumentRoot /var/www/html
    RedirectMatch ^/$ /audit/

    # Audit viewer
    Alias /audit /var/www/smbstack/web

    # Shared folder direct file access (must be before /shared)
    Alias /shared/files /home/your_user/compartida

    # Shared folder browser
    Alias /shared /var/www/smbstack/web

    <Directory /var/www/smbstack/web>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Location /audit>
        DirectoryIndex smbaudit.html
    </Location>

    <Location /shared>
        DirectoryIndex shared.php
    </Location>

    <Directory /home/your_user/compartida>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Text — open inline
        <FilesMatch "\.txt$">
            ForceType text/plain
            Header set Content-Disposition inline
        </FilesMatch>

        # PDF — open inline
        <FilesMatch "\.pdf$">
            ForceType application/pdf
            Header set Content-Disposition inline
        </FilesMatch>

        # Images — open inline
        <FilesMatch "\.(jpg|jpeg|png|gif|webp)$">
            Header set Content-Disposition inline
        </FilesMatch>

        # Rest — force download
        <FilesMatch "\.(?!(txt|pdf|jpg|jpeg|png|gif|webp)$)[^.]+$">
            ForceType application/octet-stream
            Header set Content-Disposition attachment
        </FilesMatch>
    </Directory>

    # Shared folder path (read by shared.php)
    SetEnv SMBSTACK_SHARED /home/your_user/compartida

    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy strict-origin-when-cross-origin

    # PHP
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    # Log
    ErrorLog ${APACHE_LOG_DIR}/smbstack_error.log
    CustomLog ${APACHE_LOG_DIR}/smbstack_access.log combined
</VirtualHost>
