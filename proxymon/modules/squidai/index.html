<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SquidAI – Proxy Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2330;
      --border: #30363d;
      --accent: #3498db;
      --accent-dim: rgba(52,152,219,0.15);
      --accent-glow: rgba(52,152,219,0.08);
      --green: #3fb950;
      --green-dim: rgba(63,185,80,0.12);
      --red: #f85149;
      --red-dim: rgba(248,81,73,0.12);
      --amber: #d29922;
      --amber-dim: rgba(210,153,34,0.12);
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-dim: #484f58;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
    }

    body { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-left { display: flex; align-items: center; gap: 10px; }

    .logo-badge {
      width: 32px; height: 32px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo-label {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-label span { color: var(--accent); }

    .status-dot {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
      font-family: var(--mono);
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    .dot.checking {
      background: var(--amber);
      box-shadow: 0 0 6px var(--amber);
      animation: pulse 1s infinite;
    }

    .dot.offline {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── MAIN LAYOUT ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 14px 16px 8px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .quick-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--sans);
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      margin-bottom: 5px;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 7px;
    }

    .quick-btn:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--text);
    }

    .q-icon { font-size: 13px; flex-shrink: 0; }

    /* Stats panel */
    .stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0;
      font-size: 12px;
    }
    .stat-key { color: var(--text-muted); font-family: var(--mono); font-size: 11px; }
    .stat-val { color: var(--green); font-family: var(--mono); font-size: 11px; font-weight: 600; }
    .stat-val.warn { color: var(--amber); }
    .stat-val.danger { color: var(--red); }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Messages */
    .msg { display: flex; gap: 12px; max-width: 860px; }
    .msg.user { flex-direction: row-reverse; margin-left: auto; }

    .avatar {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    .avatar.ai {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
    }

    .avatar.user-av {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13.5px;
      line-height: 1.65;
      max-width: 680px;
    }

    .msg.user .bubble {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--text);
    }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }

    .bubble .tag {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      padding: 1px 7px;
      color: var(--accent);
      margin: 2px 3px 2px 0;
    }

    .bubble .alert-line {
      display: flex; align-items: center; gap: 8px;
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: 6px;
      padding: 7px 10px;
      margin: 6px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--red);
    }

    .bubble .ok-line {
      display: flex; align-items: center; gap: 8px;
      background: var(--green-dim);
      border: 1px solid var(--green);
      border-radius: 6px;
      padding: 7px 10px;
      margin: 6px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
    }

    .bubble .warn-line {
      display: flex; align-items: center; gap: 8px;
      background: var(--amber-dim);
      border: 1px solid var(--amber);
      border-radius: 6px;
      padding: 7px 10px;
      margin: 6px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--amber);
    }

    .bubble table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 12px;
    }

    .bubble th {
      text-align: left;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--mono);
      font-weight: 600;
      font-size: 11px;
    }

    .bubble td {
      padding: 5px 10px;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      font-family: var(--mono);
      font-size: 12px;
    }

    .bubble tr:last-child td { border-bottom: none; }

    .confirm-btns {
      display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
    }

    .confirm-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      font-family: var(--mono);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .confirm-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .confirm-btn.yes { border-color: var(--green); color: var(--green); }
    .confirm-btn.yes:hover { background: var(--green-dim); }
    .confirm-btn.no { border-color: var(--red); color: var(--red); }
    .confirm-btn.no:hover { background: var(--red-dim); }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 14px 20px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13.5px;
      resize: none;
      max-height: 120px;
      min-height: 22px;
      line-height: 1.5;
    }

    #userInput::placeholder { color: var(--text-dim); }

    .send-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 32px; height: 32px;
      border-radius: 7px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
      font-size: 14px;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
      margin-top: 8px;
    }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      padding: 40px;
      text-align: center;
    }

    .welcome-icon { font-size: 48px; margin-bottom: 8px; }
    .welcome h1 { font-family: var(--mono); font-size: 22px; font-weight: 600; }
    .welcome h1 span { color: var(--accent); }
    .welcome p { color: var(--text-muted); font-size: 13px; max-width: 380px; }

    .welcome-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
      max-width: 600px;
      width: 100%;
    }

    .welcome-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }

    .welcome-card:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .welcome-card .wc-icon { font-size: 20px; margin-bottom: 8px; }
    .welcome-card .wc-title { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .welcome-card .wc-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

    .mobile-menu-bar { display: none; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .welcome-grid { grid-template-columns: 1fr; }
      .modes { display: none; }
      .topbar-subtitle { display: none; }
      .mobile-menu-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .mobile-menu-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        font-family: var(--sans);
        font-size: 11px;
        padding: 5px 9px;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        white-space: nowrap;
      }
      .mobile-menu-btn:active {
        background: var(--accent-dim);
        border-color: var(--accent);
        color: var(--text);
      }
    }

    @media (pointer: coarse) {
      .welcome-grid { display: none; }
      .messages { max-height: 55vh; }
      .input-hint { display: none; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo-badge">🦑</div>
    <span class="logo-label">Squid<span>AI</span></span>
  </div>

  <span style="font-size:12px;color:var(--text-muted);font-family:var(--mono)" class="topbar-subtitle">Assistant for Squid Proxy</span>

  <div class="status-dot">
    <div class="dot" id="llmDot"></div>
    <span id="llmModel">LLM Checking…</span>
  </div>
</header>

<!-- Mobile FAQ Menu -->
<div class="mobile-menu-bar">
  <button class="mobile-menu-btn" onclick="askForUser()">👤 Usuario</button>
  <button class="mobile-menu-btn" onclick="quickAsk(t.queryTopDomains)">🌐 Dominios</button>
  <button class="mobile-menu-btn" onclick="quickAsk(t.queryTopConsumers)">📊 Consumo</button>
  <button class="mobile-menu-btn" onclick="quickAsk(t.queryBlockedDomains)">🔒 Bloqueados</button>
  <button class="mobile-menu-btn" onclick="quickAsk(t.querySecurityIncidents)">🔴 Seguridad</button>
  <button class="mobile-menu-btn" onclick="clearChat()">🗑️ Limpiar</button>
</div>

<!-- Main -->
<div class="main">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">FAQ</div>
      <button class="quick-btn" onclick="askForUser()">
        <span class="q-icon">👤</span> User Summary
      </button>
      <button class="quick-btn" onclick="quickAsk(t.queryTopDomains)">
        <span class="q-icon">🌐</span> Top Domains
      </button>
      <button class="quick-btn" onclick="quickAsk(t.queryTopConsumers)">
        <span class="q-icon">📊</span> Top Consumers
      </button>
      <button class="quick-btn" onclick="quickAsk(t.queryUserList)">
        <span class="q-icon">📋</span> User List
      </button>
      <button class="quick-btn" onclick="quickAsk(t.queryBlockedDomains)">
        <span class="q-icon">🔒</span> Blocked Domains
      </button>
      <button class="quick-btn" onclick="quickAsk(t.queryBlockedTlds)">
        <span class="q-icon">🌍</span> Blocked TLDs
      </button>
      <button class="quick-btn" onclick="quickAsk(t.querySecurityIncidents)">
        <span class="q-icon">🔴</span> Security Incidents
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">System Status</div>
      <div class="stat-row">
        <span class="stat-key">Active Mode</span>
        <span class="stat-val" id="statMode">user</span>
      </div>
      <div class="stat-row">
        <span class="stat-key">IA</span>
        <span class="stat-val" id="statLLM">Checking…</span>
      </div>
      <div class="stat-row">
        <span class="stat-key">API Key</span>
        <span class="stat-val warn" id="statKey">●●●●●●</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Actions</div>
      <button class="quick-btn" onclick="clearChat()">
        <span class="q-icon">🗑️</span> Clear Chat
      </button>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">

      <!-- Welcome screen -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">🦑</div>
        <h1>Squid<span>AI</span></h1>
        <p id="welcomeSubtitle"></p>
        <div class="welcome-grid">
          <div class="welcome-card" onclick="askForUser()">
            <div class="wc-icon">👤</div>
            <div class="wc-title" id="wcUserTitle"></div>
            <div class="wc-desc" id="wcUserDesc"></div>
          </div>
          <div class="welcome-card" onclick="quickAsk(t.queryBlockedDomains)">
            <div class="wc-icon">🔒</div>
            <div class="wc-title" id="wcBlockTitle"></div>
            <div class="wc-desc" id="wcBlockDesc"></div>
          </div>
          <div class="welcome-card" onclick="quickAsk(t.querySecurityIncidents)">
            <div class="wc-icon">🔴</div>
            <div class="wc-title" id="wcSecTitle"></div>
            <div class="wc-desc" id="wcSecDesc"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <textarea id="userInput" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint" id="inputHint"></div>
    </div>
  </div>
</div>

<script>

// ── INTERFACE TEXTS (loaded from dataset.md in runtime) ────
const LANG = (navigator.language || navigator.userLanguage || 'en').toLowerCase().startsWith('es') ? 'es' : 'en';

// ── SOURCE OF TRUTH: dataset.md ─────────────────────────────────
// All business strings live ONLY in dataset.md
// § "UI: INTERFACE TEXTS". Do not edit strings here.
//
// `t` is a Proxy: returns '' for strings not yet loaded (never
// throws undefined nor breaks the UI during startup).
// Lambdas are built automatically from templates
// {placeholder} of the dataset by loadUITextsFromDataset().

const _tStore = {};

const t = new Proxy(_tStore, {
  get(target, key) {
    if (key in target) return target[key];
    // String not yet loaded: return empty function or empty string
    // depending on whether the code calls it as a function or as a string.
    // We use a function that also behaves as an empty string.
    const noop = (..._args) => '';
    noop.toString = () => '';
    return noop;
  },
  set(target, key, value) {
    target[key] = value;
    return true;
  }
});

let conversationHistory = [];
let currentMode = 'user';
let pendingConfirmation = null;
let apiKey = ''; // gestionada por el servidor
const WORKER_URL = 'worker.php';

// ── MODE ──
function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('statMode').textContent = mode;
}

// ── INIT UI ──
function initUI() {
  // Defensive: welcome elements may not exist if the chat has already been used
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  const inp = document.getElementById('userInput');
  if (inp) inp.placeholder = t.inputPlaceholder;
  set('inputHint',       t.inputHint);
  set('welcomeSubtitle', t.welcomeSubtitle);
  set('wcUserTitle',     t.welcomeCardUserTitle);
  set('wcUserDesc',      t.welcomeCardUserDesc);
  set('wcBlockTitle',    t.welcomeCardBlockTitle);
  set('wcBlockDesc',     t.welcomeCardBlockDesc);
  set('wcSecTitle',      t.welcomeCardSecTitle);
  set('wcSecDesc',       t.welcomeCardSecDesc);
}
// ── LLM STATUS CHECK ──────────────────────────────────────────────
async function checkLLMStatus() {
  const dot    = document.getElementById('llmDot');
  const label  = document.getElementById('llmModel');
  const stat   = document.getElementById('statLLM');

  // Estado inicial: checking
  dot.className   = 'dot checking';
  label.textContent = 'LLM Checking…';
  if (stat) { stat.textContent = 'Checking…'; stat.className = 'stat-val warn'; }

  try {
    const body = {
      system_instruction: { parts: [{ text: 'ping' }] },
      contents: [{ role: 'user', parts: [{ text: 'ping' }] }],
      generationConfig: { temperature: 0, maxOutputTokens: 8 },
    };
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);

    const res = await fetch('worker.php?action=llm_proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: controller.signal,
    });
    clearTimeout(timeout);

    if (res.ok) {
      const data = await res.json();
      const ok = data && !data.error && data.candidates?.length > 0;
      if (ok) {
        dot.className     = 'dot';
        label.textContent = 'LLM Connected';
        if (stat) { stat.textContent = 'Connected'; stat.className = 'stat-val'; }
        return;
      }
    }
    throw new Error(`HTTP ${res.status}`);
  } catch (_) {
    dot.className     = 'dot offline';
    label.textContent = 'LLM Offline';
    if (stat) { stat.textContent = 'Offline'; stat.className = 'stat-val danger'; }
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  // loadDataset loads the strings and calls initUI() when finished.
  // The call to initUI() here is just an early boot (empty strings tolerable).
  await loadDataset();
  checkLLMStatus();
  // Re-check every 60 seconds
  setInterval(checkLLMStatus, 60_000);
});

// ── QUICK ASK ──
function quickAsk(text) {
  document.getElementById('userInput').value = text;
  // Clear any pending confirmation
  pendingConfirmation = null;
  sendMessage();
}

// ── CLEAR ──
function clearChat() {
  conversationHistory = [];
  pendingConfirmation = null;
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `<div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">🦑</div>
    <h1>Squid<span>AI</span></h1>
    <p>${t.welcomeSubtitle}</p>
    <div class="welcome-grid">
      <div class="welcome-card" onclick="askForUser()">
        <div class="wc-icon">👤</div>

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── SEND MESSAGE ──
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  // Hide welcome
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.remove();
  // Add user message
  appendMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  // Handle pending confirmation
  if (pendingConfirmation) {
    await handleConfirmationReply(text);
    return;
  }
  // Normal flow
  await processQuery(text);
}

// ── APPEND MESSAGE ──
function appendMessage(role, html, withButtons) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg' + (role === 'user' ? ' user' : '');

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + (role === 'user' ? 'user-av' : 'ai');
  avatar.textContent = role === 'user' ? '👤' : '🦑';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html;

  if (role === 'user') {
    div.appendChild(bubble);
    div.appendChild(avatar);
  } else {
    div.appendChild(avatar);
    div.appendChild(bubble);
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

// ── TYPING INDICATOR ──
function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg';
  div.id = 'typingMsg';

  const avatar = document.createElement('div');

}

function removeTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

// ── FETCH WORKER DATA ──
async function fetchWorker(action, params = {}) {
  try {
    const url = new URL(WORKER_URL, window.location.href);
    url.searchParams.set('action', action);
    url.searchParams.set('lang', LANG);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    return { error: e.message };
  }
}

// ── MAIN QUERY PROCESSOR ──
async function processQuery(userText) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  showTyping();

  // Load BM25 dataset if not ready, and extract relevant context
  await loadDataset();
  const ragContext = retrieveContext(userText);

  try {
    // 1. Detect intent via BM25 on dataset.md
    let intent = detectIntentFromDataset(userText);

    // --- INTENT DETECTION BASED ON dataset.md ---
    const lowerText = userText.toLowerCase();

    // If the query mentions an ambiguous word, first check if there is
    // a real user of realname.cfg before showing the clarification menu
    const alreadyHasUser = intent.type === 'user_profile' && intent.userName;

    // Queries like "qué equipo/cliente/PC/terminal consume más" — go directly to user list + date picker
    const hasEntityWord = implicitEntityWords.some(w => {
      const re = new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
      return re.test(lowerText);
    });
    const hasConsumptionWord = implicitConsumptionWords.some(p => lowerText.includes(p));
    if (!alreadyHasUser && hasEntityWord && hasConsumptionWord) {
      pendingConfirmation = { type: 'awaiting_username' };
      removeTyping();
      appendMessage('ai', `<p>${t.userAskWhich}</p>`);
      btn.disabled = false;
      return;
    }

    if (!alreadyHasUser && ambiguousWords.some(p => lowerText.includes(p))) {
      const usersData = await fetchWorker('get_users');
      const matched = (usersData.users || []).find(u =>
        lowerText.includes(u.name.toLowerCase()) || lowerText.includes(u.ip)
      );
      if (matched) {
        intent = { type: 'user_profile', userName: matched.name };
      } else {
        intent = { type: 'ambiguous' };
      }
    }

    // 2. Fallback for keywords loaded from dataset.md
    if (intent.type !== 'ambiguous' && intent.type !== 'user_profile') {
      for (const [intentType, keywords] of Object.entries(fallbackKeywords)) {
        if (keywords.some(k => lowerText.includes(k))) {
          intent = { type: intentType };
          break;
        }
      }
    }

    let contextData = '';
    let systemPrompt = buildSystemPrompt(ragContext);

    if (intent.type === 'user_profile') {
      // Fetch users list first for fuzzy match
      const usersData = await fetchWorker('get_users');
      if (usersData.error) {
        removeTyping();
        appendMessage('ai', `<p class="warn-line">${t.errRealname(usersData.error)}</p>`);
        btn.disabled = false;
        return;
      }

      const matches = fuzzyMatchUser(intent.userName, usersData.users);

      if (matches.length === 0) {
        removeTyping();
        appendMessage('ai', `<p>${t.userNotFound(intent.userName)}</p><p>${t.usersAvailable}</p>${renderUserList(usersData.users)}`);
        btn.disabled = false;
        return;
      }

      if (matches.length === 1) {
        // One match — ask confirmation
        pendingConfirmation = { type: 'user_profile', user: matches[0], usersData };
        removeTyping();
        const html = `<p>${t.userFoundOne(intent.userName)}</p>
          <table><tr><th>IP</th><th>Name</th></tr>
          <tr><td>${matches[0].ip}</td><td>${matches[0].name}</td></tr></table>
          <p>${t.userConfirmQuestion}</p>
          <div class="confirm-btns">
            <button class="confirm-btn yes" onclick="confirmUser(true)">${t.userConfirmYes}</button>
            <button class="confirm-btn no" onclick="confirmUser(false)">${t.userConfirmNo}</button>
          </div>`;
        appendMessage('ai', html);
        btn.disabled = false;
        return;
      }

      // Multiple matches
      pendingConfirmation = { type: 'multi_user', matches, usersData, query: intent.userName };
      removeTyping();
      let rows = matches.map((u, i) => `<tr><td><button class="confirm-btn" onclick="selectUser(${i})">${i+1}</button></td><td>${u.ip}</td><td>${u.name}</td></tr>`).join('');
      const html = `<p>${t.userFoundMany(intent.userName)}</p>
        <table><tr><th>#</th><th>IP</th><th>Name</th></tr>${rows}</table>
        <p>${t.userSelectPrompt}</p>`;
      appendMessage('ai', html);
      btn.disabled = false;
      return;
    }

    // ── Intents that are rendered directly without LLM ──

    if (intent.type === 'list_users') {
      const usersData = await fetchWorker('get_users');
      removeTyping();
      appendMessage('ai', `<p>${t.usersRegistered(usersData.count)}</p>${renderUserList(usersData.users)}`);
      btn.disabled = false;
      return;
    }

    if (intent.type === 'blocked') {
      const data = await fetchWorker('get_blocked_domains');
      const topMatch = userText.match(/top\s*(\d+)/i);
      if (topMatch) {
        const n = parseInt(topMatch[1]);
        data.incidents = (data.incidents || []).slice(0, n);
        data.count = data.incidents.length;
      }
      removeTyping();
      appendMessage('ai', renderBlockTable(data, t.titleBlockedDomains, 'domains'));
      btn.disabled = false;
      return;
    }

    if (intent.type === 'security_incidents') {
      const data = await fetchWorker('get_blocked_patterns');
      removeTyping();
      appendMessage('ai', renderSecurityIncidents(data));
      btn.disabled = false;
      return;
    }

    if (intent.type === 'blocked_tlds') {
      const data = await fetchWorker('get_blocked_tlds');
      removeTyping();
      appendMessage('ai', renderBlockTable(data, t.titleBlockedTlds, 'tlds'));
      btn.disabled = false;
      return;
    }

    if (intent.type === 'threshold') {
      const gbMatch = userText.match(/(\d+(?:\.\d+)?)\s*gb/i);
      if (!gbMatch) {
        removeTyping();
        appendMessage('ai', `<p>${t.thresholdNoLimit}</p>`);
        btn.disabled = false;
        return;
      }

      const thresholdGb = parseFloat(gbMatch[1]);
      const thresholdBytes = thresholdGb * 1073741824;

      const datesData = await fetchWorker('get_report_dates');
      const availableDates = datesData.dates || [];

      const dateBtns = availableDates.slice(0, 10).map(d =>
        `<button class="confirm-btn" onclick="checkThresholdDate('${d.folder}', ${thresholdGb})">${d.label}</button>`
      ).join('');

      const netData = await fetchWorker('get_network_summary', { date: 'today' });
      const filtered = (netData.top_users || []).filter(u => u.bytes >= thresholdBytes);

      removeTyping();

      let response = `<p>${t.thresholdToday(new Date().toISOString().slice(0,10))}</p>`;
      if (filtered.length === 0) {
        response += `<p>${t.thresholdNone(thresholdGb)}</p>`;
      } else {
        const rows = filtered.map(u => `<tr><td>${u.ip}</td><td>${u.name}</td><td>${u.bytes_human}</td></tr>`).join('');
        response += `<table><thead><tr><th>IP</th><th>Name</th><th>Usage</th></tr></thead><tbody>${rows}</tbody></table>`;
      }

      response += `<p>${t.thresholdAnotherDate}</p><div class="confirm-btns">${dateBtns}</div>`;
      appendMessage('ai', response);

      pendingConfirmation = { type: 'threshold_date', thresholdGb, originalQuery: userText };
      btn.disabled = false;
      return;
    }

    if (intent.type === 'network') {
      const mentionsToday = /\bhoy\b|today/i.test(userText);
      const dateMatch = userText.match(/\b(\d{4}-\d{2}-\d{2}|\d{2}\/\d{2}\/\d{4})\b/);

      if (mentionsToday || dateMatch) {
        const date = dateMatch ? dateMatch[1] : 'today';
        const netData = await fetchWorker('get_network_summary', { date });
        contextData = JSON.stringify(netData);
        const intentInstructions = retrieveContextForIntent('INTENCIÓN: red_global');
        systemPrompt += `\n\n${intentInstructions}\n\nCONTEXTO DE RED (JSON):\n${contextData}`;
      } else {
        removeTyping();
        btn.disabled = false;
        const datesData = await fetchWorker('get_report_dates');
        if (datesData.error || !datesData.dates?.length) {
          appendMessage('ai', `<p class="warn-line">${t.noReports}</p>`);
          return;
        }
        const btns = datesData.dates.map(d =>
          `<button class="confirm-btn" onclick="loadNetworkDate('${d.folder}','${d.label}')">${d.label}</button>`
        ).join('');
        appendMessage('ai', `<p>${t.networkAskDate}</p><div class="confirm-btns">${btns}</div>`);
        pendingConfirmation = { type: 'network_date', originalQuery: userText };
        return;
      }
    }
    
    if (intent.type === 'ambiguous') {
      removeTyping();
      btn.disabled = false;
      
      // Texto para cada opción con "hoy" explícito
      const networkQuery  = t.queryNetworkToday;
      const blockedQuery  = t.queryBlockedToday;
      const securityQuery = t.querySecurityToday;
      const tldsQuery     = t.queryTldsToday;
      
      const html = `<p>${t.summaryAskWhat}</p>
        <div class="confirm-btns">
          <button class="confirm-btn" onclick="quickAsk('${networkQuery}')">${t.summaryOptNetwork}</button>
          <button class="confirm-btn" onclick="askForUserToday()">${t.summaryOptUser}</button>
          <button class="confirm-btn" onclick="quickAsk('${blockedQuery}')">${t.summaryOptBlocked}</button>
          <button class="confirm-btn" onclick="quickAsk('${securityQuery}')">${t.summaryOptSecurity}</button>
          <button class="confirm-btn" onclick="quickAsk('${tldsQuery}')">${t.summaryOptTlds}</button>
        </div>`;
      appendMessage('ai', html);
      return;
    }

    if (intent.type === 'general') {
      const usersData = await fetchWorker('get_users');
      contextData = JSON.stringify(usersData);
      systemPrompt += '\n\nUSUARIOS DISPONIBLES (JSON):\n' + contextData;
    }

    // Call LLM
    conversationHistory.push({ role: 'user', parts: [{ text: userText }] });
    trimHistory();
    const reply = await callLLM(systemPrompt, conversationHistory);
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });

    removeTyping();
    appendMessage('ai', formatAIReply(reply));

  } catch (err) {
    removeTyping();
    appendMessage('ai', `<p class="alert-line">${t.errGeneric(err.message)}</p>`);
  }

  btn.disabled = false;
}

// ── CONFIRMATION HANDLERS ──
window.confirmUser = async function(yes) {
  if (!pendingConfirmation) return;
  if (!yes) {
    pendingConfirmation = null;
    appendMessage('ai', `<p>${t.userMoreDetails}</p>`);
    return;
  }
  await loadUserProfile(pendingConfirmation.user);
};

window.selectUser = async function(idx) {
  if (!pendingConfirmation || !pendingConfirmation.matches) return;
  const user = pendingConfirmation.matches[idx];
  pendingConfirmation = { ...pendingConfirmation, user };
  await loadUserProfile(user);
};

async function handleConfirmationReply(text) {
  const btn = document.getElementById('sendBtn');
  const lower = text.toLowerCase().trim();

  if (pendingConfirmation.type === 'awaiting_username' || pendingConfirmation.type === 'awaiting_username_today') {
    const isToday = pendingConfirmation.type === 'awaiting_username_today';
    pendingConfirmation = null;
    btn.disabled = true;
    showTyping();
    const usersData = await fetchWorker('get_users');
    if (usersData.error) {
      removeTyping();
      appendMessage('ai', `<p class="warn-line">${t.errRealname(usersData.error)}</p>`);
      btn.disabled = false;
      return;
    }
    const matches = fuzzyMatchUser(text.trim(), usersData.users);
    removeTyping();
    if (matches.length === 0) {
      appendMessage('ai', `<p>${t.userNotFound(text.trim())}</p><p>${t.usersAvailable}</p>${renderUserList(usersData.users)}`);
      btn.disabled = false;
      return;
    }
    if (matches.length === 1) {
      if (isToday) {
        await loadUserReport(matches[0], 'today');
      } else {
        pendingConfirmation = { type: 'user_profile', user: matches[0] };
        const html = `<p>${t.userFound}</p>
          <table>
            <tr><th>IP</th><th>Name</th></tr>
            <tr><td>${matches[0].ip}</td><td>${matches[0].name}</td></tr>
          </table>
          <p>${t.userConfirmQuestion}</p>
          <div class="confirm-btns">
            <button class="confirm-btn yes" onclick="confirmUser(true)">${t.userConfirmYes}</button>
            <button class="confirm-btn no" onclick="confirmUser(false)">${t.userConfirmNo}</button>
          </div>`;
        appendMessage('ai', html);
      }
      btn.disabled = false;
      return;
    }
    // Múltiples matches
    pendingConfirmation = { type: 'multi_user', matches, query: text.trim() };
    let rows = matches.map((u, i) => `<tr><td><button class="confirm-btn" onclick="selectUser(${i})">${i+1}</button></td><td>${u.ip}</td><td>${u.name}</td></tr>`).join('');
    const html = `<p>${t.userFoundSeveral(text.trim())}</p>
      <table>
        <tr><th>#</th><th>IP</th><th>Name</th></tr>
        ${rows}
      </table>
      <p>${t.userSelectPrompt}</p>`;
    appendMessage('ai', html);
    btn.disabled = false;
    return;
  }

  if (pendingConfirmation.type === 'date_confirm') {
    await loadUserReport(pendingConfirmation.user, text);
    return;
  }

  if (pendingConfirmation.type === 'multi_user') {
    const idx = parseInt(lower) - 1;
    if (!isNaN(idx) && idx >= 0 && idx < pendingConfirmation.matches.length) {
      await selectUser(idx);
      return;
    }
    const match = pendingConfirmation.matches.find(u =>
      u.name.toLowerCase().includes(lower) || lower.includes(u.name.toLowerCase())
    );
    if (match) {
      await selectUser(pendingConfirmation.matches.indexOf(match));
      return;
    }
    appendMessage('ai', `<p>${t.userNotUnderstood}</p>`);
    btn.disabled = false;
    return;
  }

  if (pendingConfirmation.type === 'user_profile') {
    if (lower.includes('sí') || lower.includes('si') || lower === 'yes' || lower === 's') {
      await loadUserProfile(pendingConfirmation.user);
    } else {
      pendingConfirmation = null;
      appendMessage('ai', `<p>${t.userGotIt}</p>`);
    }
    btn.disabled = false;
    return;
  }

  pendingConfirmation = null;
  appendMessage('ai', `<p>${t.userGotIt}</p>`);
  btn.disabled = false;
}

async function loadUserProfile(user) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  pendingConfirmation = { type: 'date_confirm', user };
  try {
    const dates = await fetchWorker('get_available_dates', { ip: user.ip });
    if (dates.error) throw new Error(dates.error);
    if (dates.dates && dates.dates.length > 0) {
      const btns = dates.dates.map(d =>
        `<button class="confirm-btn" onclick="selectDate('${d}')">${d}</button>`
      ).join('');
      const datesHtml = `<p>${t.datesAvailable}</p><div class="confirm-btns">${btns}</div>`;
      appendMessage('ai', `<p>${t.userConfirmed(user.name, user.ip)}</p>
        <p>${t.dateAsk}</p>${datesHtml}`);
    } else {
      appendMessage('ai', `<p>${t.userConfirmed(user.name, user.ip)}</p>
        <p>${t.datesNone}</p>`);
      await loadUserReport(user, 'today');
      return;
    }
  } catch (err) {
    appendMessage('ai', `<p class="alert-line">${t.errGeneric(err.message)}</p>`);
    pendingConfirmation = null;
  } finally {
    btn.disabled = false;
  }
}

window.selectDate = async function(date) {
  if (!pendingConfirmation) return;
  await loadUserReport(pendingConfirmation.user, date);
};

window.checkThresholdDate = async function(dateFolder, thresholdGb) {
  pendingConfirmation = null;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  showTyping();

  const thresholdBytes = thresholdGb * 1073741824;
  const netData = await fetchWorker('get_network_summary', { date: dateFolder });
  if (netData.error) {
    appendMessage('ai', `<p class="warn-line">${t.errGeneric(netData.error)}</p>`);
    btn.disabled = false;
    return;
  }
  const filtered = (netData.top_users || []).filter(u => u.bytes >= thresholdBytes);

  removeTyping();
  if (filtered.length === 0) {
    appendMessage('ai', `<p>${t.thresholdNoneDate(thresholdGb)}</p>`);
  } else {
    const dateLabel = dateFolder.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
    const rows = filtered.map(u => `<tr>
        <td>${u.ip}</td>
        <td>${u.name}</td>
        <td>${u.bytes_human}</td>
      </tr>`).join('');
    appendMessage('ai', `<p>${t.thresholdExceeded(thresholdGb, dateLabel)}</p>
      <table><thead><tr><th>IP</th><th>Name</th><th>Usage</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`);
  }
  btn.disabled = false;
};

async function loadUserReport(user, date) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  
  // Clear pendingConfirmation AT START, before any async operation
  pendingConfirmation = null;
  
  showTyping();

  try {
    const reportData = await fetchWorker('get_user_report', { ip: user.ip, date });
    const blacklistData = await fetchWorker('check_blacklist', { ip: user.ip, date });
    
    const intentInstructions = retrieveContextForIntent('INTENCIÓN: perfil_usuario');
    const systemPrompt = buildSystemPrompt() + `\n\n${intentInstructions}\n\n` +
      `REPORTE DE USUARIO (JSON):\n${JSON.stringify(reportData)}\n\n` +
      `LISTA NEGRA (JSON):\n${JSON.stringify(blacklistData)}\n\n` +
      `Usuario: ${user.name} (${user.ip}) — Fecha: ${date}`;

    conversationHistory.push({ role: 'user', parts: [{ text: `Full report for ${user.name} on ${date}` }] });
    trimHistory();
    const reply = await callLLM(systemPrompt, conversationHistory);
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });

    removeTyping();
    const reportBubble = appendMessage('ai', formatAIReply(reply));
    // Add PDF export button to user report
    const pdfBtn = document.createElement('button');
    pdfBtn.className = 'confirm-btn';
    pdfBtn.style.cssText = 'margin-top:10px;display:flex;align-items:center;gap:6px;';
    pdfBtn.innerHTML = '📄 PDF';
    pdfBtn.onclick = () => exportReportPDF(user.name, user.ip, date, reportBubble.innerHTML);
    reportBubble.appendChild(pdfBtn);
  } catch (err) {
    removeTyping();
    appendMessage('ai', `<p class="alert-line">${t.errGeneric(err.message)}</p>`);
    pendingConfirmation = null;
  } finally {
    btn.disabled = false;
  }
}

// ── PDF EXPORT ───────────────────────────────────────────────────
function exportReportPDF(userName, ip, date, bubbleHTML) {

// ── INTENT DETECTION VIA BM25 ────────────────────────────────────
// No word lists here. The dataset.md is the source of truth.
// BM25 ranks sections of the dataset against the query and the top result
// determines the intent. Each intent section has a canonical id.

const INTENT_SECTION_MAP = {
  'INTENCIÓN: perfil_usuario': 'user_profile',
  'INTENCIÓN: red_global': 'network',
  'INTENCIÓN: security_incidents': 'security_incidents',
  'INTENCIÓN: accesos_bloqueados': 'blocked',
  'INTENCIÓN: tlds_bloqueados': 'blocked_tlds',
  'INTENCIÓN: listar_usuarios': 'list_users',
};

function detectIntentFromDataset(query) {
  if (!bm25Corpus || !bm25Corpus.paragraphs.length) return { type: 'general' };

  const qTokens = tokenize(query);
  if (!qTokens.length) return { type: 'general' };

  const avgdl = bm25Corpus.paragraphs.reduce((s, p) => s + p.tokens.length, 0)
              / bm25Corpus.paragraphs.length;

  let bestIntent = null;
  let bestScore = 0;

  const intentMap = {
    'INTENCIÓN: perfil_usuario': 'user_profile',
    'INTENCIÓN: red_global': 'network',
    'INTENCIÓN: security_incidents': 'security_incidents',
    'INTENCIÓN: accesos_bloqueados': 'blocked',
    'INTENCIÓN: tlds_bloqueados': 'blocked_tlds',
    'INTENCIÓN: listar_usuarios': 'list_users',
  };

  for (const [sectionTitle, intentType] of Object.entries(intentMap)) {
    const sectionParagraphs = bm25Corpus.paragraphs.filter(p =>
      p.section === sectionTitle
    );
    if (!sectionParagraphs.length) continue;

    const score = sectionParagraphs.reduce((sum, p) =>
      sum + bm25Score(qTokens, p.tokens, bm25Corpus.idf, 1.5, 0.75, avgdl), 0
    );

    if (score > bestScore) {
      bestScore = score;
      bestIntent = intentType;
    }
  }

  if (bestScore < 1.5) return { type: 'general' };

  if (bestIntent === 'user_profile') {
    const userName = extractUserName(query);
    if (userName) return { type: 'user_profile', userName };
    return { type: 'awaiting_username' };
  }

  return { type: bestIntent };
}

function extractUserName(text) {
  // only extracts if there is a clear named structural pattern after
  // (genericWords is loaded from dataset.md § "LISTAS DE CONTROL")

  const patterns = [
    /\busuario\s+(\S+)/i,
    /\bactividad\s+de\s+(\S+)/i,
    /\bactividad\s+del\s+usuario\s+(\S+)/i,
    /\breporte\s+de\s+(\S+)/i,
    /\bperfil\s+de\s+(\S+)/i,
    /\btrafico\s+de\s+(\S+)/i,
    /\btráfico\s+de\s+(\S+)/i,
    /\bqué\s+hizo\s+(\S+)/i,
    /\bque\s+hizo\s+(\S+)/i,
    /\bqué\s+visita\s+(\S+)/i,
    /\bqué\s+navega\s+(\S+)/i,
    /\bresumen\s+de\s+(\S+)/i,
  ];

  for (const p of patterns) {
    const m = text.match(p);
    if (m) {
      const candidate = m[1].replace(/[¿?.,;:!]$/, '').trim();
      if (candidate && !genericWords.has(candidate.toLowerCase())) return candidate;
    }
  }

  // System's own format
  const sysMatch = text.match(/\b([A-Z]{1,6}-[A-Z0-9]{2,15})\b/);
  if (sysMatch) return sysMatch[1];

  return null;
}

// ── BM25 ─────────────────────────────────────────────────────────
let bm25Corpus = null;

async function loadDataset() {
  try {
    const res = await fetchWorker('get_dataset');
    if (res.error || !res.content) return;
    if (!bm25Corpus) bm25Corpus = buildBM25Index(res.content);
    loadUITextsFromDataset(res.content);
    loadControlLists(res.content);
    initUI();
  } catch (e) { /* dataset opcional, no falla */ }
}

/** Replaces {key} in a template with the values ​​of the given object. */
function interpolate(template, values) {
  return template.replace(/\{(\w+)\}/g, (_, key) => values[key] ?? `{${key}}`);
}

/** Returns the placeholder names present in a template. */
function extractPlaceholders(template) {
  return [...template.matchAll(/\{(\w+)\}/g)].map(m => m[1]);
}

/**
 * Read "UI: INTERFACE TEXTS" from dataset.md and populate `t`.
 * Strings without placeholders → direct string.
 * Strings with {placeholders} → function that accepts positional args
 * mapped to the order of appearance of the placeholders.
 */
function loadUITextsFromDataset(markdownText) {
  const uiSectionMatch = markdownText.match(/## UI: TEXTOS DE INTERFAZ[^\n]*\n([\s\S]*?)(?=\n## |\n---\s*$|$)/);
  if (!uiSectionMatch) return;

  const sectionText = uiSectionMatch[1];
  const lines = sectionText.split('\n');

  // Parse line by line detecting each table by its header | key | is | in |
  // Bugfix: 3-column global regex derails with padding
  // width columns used by dataset.md, reading values as keys and vice versa.
  let iClave = -1, iEs = -1, iEn = -1;

  const parseCells = (line) =>
    line.split('|').map(c => c.trim()).filter((_, i, arr) => i > 0 && i < arr.length - 1);

  for (const line of lines) {
    if (!line.includes('|')) { iClave = iEs = iEn = -1; continue; }

    const cells = parseCells(line);
    if (!cells.length) continue;

    // Separator row (---|---|---)
    if (cells.every(c => /^-+$/.test(c))) continue;

    // Table header: detect key/es/en columns by name
    const lc = cells.map(c => c.toLowerCase());
    if (lc.includes('clave') && lc.includes('es') && lc.includes('en')) {
      iClave = lc.indexOf('clave');
      iEs    = lc.indexOf('es');
      iEn    = lc.indexOf('en');
      continue;
    }

    // Data row: requires that the header has been detected
    if (iClave === -1 || cells.length <= Math.max(iClave, iEs, iEn)) continue;

    const key   = cells[iClave];
    const esVal = cells[iEs];
    const enVal = cells[iEn];

    if (!key || key === 'clave') continue;

    const value = LANG === 'es' ? esVal : enVal;
    if (!value) continue;

    const placeholders = extractPlaceholders(value);
    if (placeholders.length > 0) {
      t[key] = ((...args) => {
        const vals = {};
        placeholders.forEach((p, i) => { vals[p] = args[i] ?? ''; });
        return interpolate(value, vals);
      });
    } else {
      t[key] = value;
    }
  }
}

// Checklists loaded from dataset.md
let genericWords = new Set([]);
let ambiguousWords = [];
let implicitEntityWords = [];
let implicitConsumptionWords = [];
let extractionPatterns = [];
let systemPromptBase = '';
let systemPromptRestrictions = [];
let fallbackKeywords = {}; // { intentType: ['keyword', ...] }

const FALLBACK_SECTION_MAP = {
  'INTENCIÓN: accesos_bloqueados':  'blocked',
  'INTENCIÓN: security_incidents':  'security_incidents',
  'INTENCIÓN: umbral_consumo':      'threshold',
  'INTENCIÓN: listar_usuarios':     'list_users',
};

/**
 * Reads "CHECKLISTS" from dataset.md and populates the global lists.
 */
function loadControlLists(markdownText) {
  // Palabras genéricas
  const genericMatch = markdownText.match(/### Palabras genéricas[^\n]*\n\n([^\n#]+)/);
  if (genericMatch) {
    genericWords = new Set(
      genericMatch[1].split(',').map(w => w.trim().toLowerCase()).filter(Boolean)
    );
  }

  // ambiguous words
  const ambiguousMatch = markdownText.match(/### Palabras ambiguas[^\n]*\n\n([^\n#]+)/);
  if (ambiguousMatch) {
    ambiguousWords = ambiguousMatch[1].split(',').map(w => w.trim().toLowerCase()).filter(Boolean);
  }

  // implicit profile detection — two independent components
  const implicitEntityMatch = markdownText.match(/### Palabras de entidad de red[^\n]*\n\n([^\n#]+)/);
  if (implicitEntityMatch) {
    implicitEntityWords = implicitEntityMatch[1].split(',').map(w => w.trim().toLowerCase()).filter(Boolean);
  }
  const implicitConsumptionMatch = markdownText.match(/### Palabras de consumo comparativo[^\n]*\n\n([^\n#]+)/);
  if (implicitConsumptionMatch) {
    implicitConsumptionWords = implicitConsumptionMatch[1].split(',').map(w => w.trim().toLowerCase()).filter(Boolean);
  }

  // name extraction patterns
  const extractionMatch = markdownText.match(/### Patrones \| Patterns\n\n([^\n#]+)/);
  if (extractionMatch) {
    extractionPatterns = extractionMatch[1].split(',').map(w => w.trim().toLowerCase()).filter(Boolean);
  }

  // system prompt — base instruction
  const sysBaseMatch = markdownText.match(/### Instrucción base \| Base instruction\n\n([\s\S]*?)(?=\n###|\n---|\n##|$)/);
  if (sysBaseMatch) systemPromptBase = sysBaseMatch[1].trim();

  // system prompt — strict restrictions
  const sysRestMatch = markdownText.match(/### Restricciones estrictas \| Strict restrictions\n\n([\s\S]*?)(?=\n###|\n---|\n##|$)/);
  if (sysRestMatch) {
    systemPromptRestrictions = sysRestMatch[1].split('\n').map(l => l.trim()).filter(l => l.startsWith('-'));
  }

  // Fallback keywords by intent (from dataset.md)
  fallbackKeywords = {};
  for (const [section, intentType] of Object.entries(FALLBACK_SECTION_MAP)) {
    // Find the intent section and within it the fallback subsection
    const sectionEscaped = section.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(
      `## ${sectionEscaped}[\\s\\S]*?### Palabras clave de fallback[^\\n]*\\n\\n\\| Español[^\\n]*\\n\\|[-| ]+\\n((?:\\|[^\\n]+\\|\\n?)+)`,
      'i'
    );
    const m = markdownText.match(re);
    if (!m) continue;
    const words = [];
    for (const row of m[1].split('\n')) {
      if (!row.trim() || !row.includes('|')) continue;
      const cells = row.split('|').map(c => c.trim()).filter(Boolean);
      if (cells[0]) words.push(cells[0].toLowerCase()); // Español
      if (cells[1]) words.push(cells[1].toLowerCase()); // English
    }
    fallbackKeywords[intentType] = words;
  }
}

function tokenize(text) {
  return text.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(t => t.length > 2);
}

function buildBM25Index(markdownText) {
  const lines = markdownText.split('\n');
  const paragraphs = [];
  let currentSection = null;
  let buffer = [];

  const flushBuffer = () => {
    const text = buffer.join('\n').trim();
    if (text.length > 20) {
      const keywords = extractKeywordsFromTables(text);
      const enrichedText = text + '\n' + keywords.join(' ');
      paragraphs.push({ 
        text: text, 
        section: currentSection, 
        tokens: tokenize(enrichedText) 
      });
    }
    buffer = [];
  };

  for (const line of lines) {
    const intentMatch = line.match(/^## (INTENCIÓN: [^|]+) \| (INTENT: [^|]+)/);
    if (intentMatch) {
      flushBuffer();
      currentSection = intentMatch[1];
      buffer.push(line);
      continue;
    }
    const oldIntentMatch = line.match(/^## (INTENCIÓN: \S+)/);
    if (oldIntentMatch) {
      flushBuffer();
      currentSection = oldIntentMatch[1];
      buffer.push(line);
      continue;
    }
    if (line.startsWith('## ') && !intentMatch && !oldIntentMatch) {
      flushBuffer();
      currentSection = null;
    }
    buffer.push(line);
  }
  flushBuffer();

  const N = paragraphs.length;
  const df = {};
  paragraphs.forEach(p => {
    new Set(p.tokens).forEach(t => { df[t] = (df[t] || 0) + 1; });
  });
  const idf = {};
  Object.entries(df).forEach(([t, freq]) => {
    idf[t] = Math.log((N - freq + 0.5) / (freq + 0.5) + 1);
  });

  return { paragraphs, idf };
}

function extractKeywordsFromTables(text) {
  const keywords = [];
  
  const tableRegex = /\|\s*Español\s*\|\s*English\s*\|\n\|[-|\s]+\|\n((?:\|.*\|\n?)+)/g;
  let match;
  
  while ((match = tableRegex.exec(text)) !== null) {
    const tableContent = match[1];
    const rows = tableContent.split('\n');
    
    for (const row of rows) {
      if (!row.trim()) continue;
      const cells = row.split('|').filter(cell => cell.trim());
      if (cells.length >= 2) {
        keywords.push(cells[0].trim());
        keywords.push(cells[1].trim());
      }
    }
  }
  
  const keywordSectionRegex = /### Palabras clave \| Keywords\n\n((?:\|.*\|\n?)+)/g;
  while ((match = keywordSectionRegex.exec(text)) !== null) {
    const tableContent = match[1];
    const rows = tableContent.split('\n');
    
    for (const row of rows) {
      if (!row.trim() || !row.includes('|')) continue;
      const cells = row.split('|').filter(cell => cell.trim());
      if (cells.length >= 2) {
        const spanishWords = cells[0].split(/[,\s]+/).filter(w => w.length > 2);
        const englishWords = cells[1].split(/[,\s]+/).filter(w => w.length > 2);
        keywords.push(...spanishWords);
        keywords.push(...englishWords);
      }
    }
  }
  
  return keywords;
}

function bm25Score(qTokens, docTokens, idf, k1 = 1.5, b = 0.75, avgdl = 50) {
  const dl = docTokens.length;
  const tf = {};
  docTokens.forEach(t => { tf[t] = (tf[t] || 0) + 1; });
  let score = 0;
  qTokens.forEach(t => {
    if (!idf[t]) return;
    const freq = tf[t] || 0;
    score += idf[t] * (freq * (k1 + 1)) / (freq + k1 * (1 - b + b * dl / avgdl));
  });
  return score;
}

function retrieveContext(query, topK = 4) {
  if (!bm25Corpus || !bm25Corpus.paragraphs.length) return '';
  const qTokens = tokenize(query);
  if (!qTokens.length) return '';
  const avgdl = bm25Corpus.paragraphs.reduce((s, p) => s + p.tokens.length, 0)
              / bm25Corpus.paragraphs.length;
  const scored = bm25Corpus.paragraphs
    .map(p => ({ text: p.text, score: bm25Score(qTokens, p.tokens, bm25Corpus.idf, 1.5, 0.75, avgdl) }))
    .sort((a, b) => b.score - a.score)
    .filter(s => s.score > 0)
    .slice(0, topK);
  if (!scored.length) return '';
  return '\n\nCONTEXTO RELEVANTE DE LA BASE DE CONOCIMIENTO:\n'
    + scored.map(r => r.text).join('\n\n---\n\n');
}

function retrieveContextForIntent(intentSection) {
  if (!bm25Corpus) return '';
  
  // Bring the paragraphs from the intention section
  const intentParagraphs = bm25Corpus.paragraphs.filter(p => p.section === intentSection);
  
  // Bring the formatting instructions by searching by the exact section title
  const formatParagraphs = bm25Corpus.paragraphs.filter(p => 
    p.section === 'INSTRUCCIONES DE FORMATO PARA LLM | FORMATTING INSTRUCTIONS FOR LLM'
  );
  
  const allParagraphs = [...intentParagraphs, ...formatParagraphs];
  if (!allParagraphs.length) return '';
  
  return 'INSTRUCCIONES PARA ESTA CONSULTA (del knowledge base):\n'
       + allParagraphs.map(p => p.text).join('\n\n');
}

// ── FUZZY USER MATCH ──────────────────────────────────────────────
function fuzzyMatchUser(query, users) {
  if (!users || !query) return [];
  const q = query.toLowerCase().replace(/[^a-z0-9]/g, '');
  if (q.length < 2) return [];
  return users.filter(u => {
    const name = u.name.toLowerCase().replace(/[^a-z0-9]/g, '');
    if (name === q || name.includes(q)) return true;
    if (q.length >= 5 && name.length >= 5) {
      const maxDist = Math.max(1, Math.floor(Math.min(q.length, name.length) / 4));
      return levenshtein(q, name) <= maxDist;
    }
    return false;
  });
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) =>
    Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function renderUserList(users) {
  if (!users || !users.length) return `<p class="warn-line">${t.noUsers}</p>`;
  const rows = users.map(u => `<tr><td>${u.ip}</td><td>${u.name}</td></tr>`).join('');
  return `<table><thead><tr><th>IP</th><th>${t.labelName}</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function getSeverity(pattern, hits) {
  const p = (pattern || '').toLowerCase();
  // CRITICAL sin importar hits
  if (p.includes('jndi') || p.includes('.onion')) return 'CRITICAL';
  // IPv4 directa y patrones P2P: por hits
  if (hits >= 20) return 'CRITICAL';
  if (hits >= 5)  return 'HIGH';
  return 'MEDIUM';
}

function severityBadge(sev) {
  if (sev === 'CRITICAL') return '<span style="color:var(--red);font-weight:600">🔴 CRITICAL</span>';
  if (sev === 'HIGH')     return '<span style="color:var(--amber)">🟠 HIGH</span>';
  return '<span style="color:var(--text-muted)">🟡 MEDIUM</span>';
}

function renderSecurityIncidents(data) {
  if (data.error) return `<p class="warn-line">⚠️ ${data.error}</p>`;
  const incidents = data.incidents || [];
  if (!incidents.length) return `<p class="ok-line">${t.securityNone}</p>`;

  const rows = incidents.map(inc => {
    const sev = getSeverity(inc.pattern, inc.hits);
    const pat = `<code style="font-family:var(--mono);font-size:11px;background:var(--surface2);padding:1px 6px;border-radius:3px;color:var(--accent)">${escHtml(inc.pattern || '')}</code>`;
    return { ...inc, sev, pat };
  });

  const order = { CRITICAL: 0, HIGH: 1, MEDIUM: 2 };
  rows.sort((a, b) => order[a.sev] - order[b.sev] || b.hits - a.hits);

  const tableRows = rows.map(r =>
    `<tr>
      <td style="font-family:var(--mono);font-size:12px">${r.ip}</td>
      <td>${r.name}</td>
      <td>${r.pat}</td>
      <td style="text-align:center">${r.hits}</td>
      <td>${severityBadge(r.sev)}</td>
    </tr>`
  ).join('');

  const critCount = rows.filter(r => r.sev === 'CRITICAL').length;
  const highCount = rows.filter(r => r.sev === 'HIGH').length;
  const medCount  = rows.filter(r => r.sev === 'MEDIUM').length;

  const summary = `<p style="margin-bottom:8px">${t.securitySummary(rows.length, critCount, highCount, medCount)}</p>`;

  const nameLabel     = t.labelName;
  const patternLabel  = t.labelPattern;
  const hitsLabel     = t.labelHits;
  const severityLabel = t.labelSeverity;

  return `${summary}
  <table>
    <thead>
      <tr>
        <th>IP</th>
        <th>${nameLabel}</th>
        <th>${patternLabel}</th>
        <th style="text-align:center">${hitsLabel}</th>
        <th>${severityLabel}</th>
      </tr>
    </thead>
    <tbody>${tableRows}</tbody>
  </table>`;
}

function renderBlockTable(data, title, mode) {
  if (data.error) return `<p class="warn-line">⚠️ ${data.error}</p>`;
  const incidents = data.incidents || [];
  if (!incidents.length) return `<p class="ok-line">✅ ${title}: no records today.</p>`;

  const count = data.incident_count ?? data.count ?? incidents.length;
  const nameLabel = t.labelName;
  const hitsLabel = t.labelHits;

  if (mode === 'patterns') {
    const rows = incidents.map(inc => {
      const sev = inc.severity === 'CRITICAL' ? ' style="color:var(--red);font-weight:600"'
                : inc.severity === 'HIGH'     ? ' style="color:var(--amber)"' : '';
      const pat = `<code style="font-family:var(--mono);font-size:11px;background:var(--surface2);padding:1px 6px;border-radius:3px;color:var(--accent)">${escHtml(inc.pattern || inc.domain || '')}</code>`;
      return `<tr><td>${inc.ip}</td><td>${inc.name}</td><td>${pat}</td><td${sev}>${inc.hits}</td></tr>`;
    }).join('');
    return `<p>${title} <span style="color:var(--text-muted);font-size:12px">${t.recordCount(count)}</span></p>
      <table>
        <thead><tr><th>IP</th><th>${nameLabel}</th><th>Pattern</th><th>${hitsLabel}</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  let rows = '';
  for (const inc of incidents) {
    const domainList = inc.domains && inc.domains.length ? inc.domains : [inc.domain || ''];
    const sev = inc.severity === 'CRITICAL' ? ' style="color:var(--red);font-weight:600"'
              : inc.severity === 'HIGH'     ? ' style="color:var(--amber)"' : '';
    domainList.forEach((dom, i) => {
      rows += `<tr>
        <td>${i === 0 ? inc.ip : ''}</td>
        <td>${i === 0 ? inc.name : ''}</td>
        <td style="font-family:var(--mono);font-size:12px">${escHtml(dom)}</td>
        <td${sev}>${i === 0 ? inc.hits : ''}</td>
      </tr>`;
    });
  }
  const colLabel = mode === 'tlds' ? 'TLD' : t.labelDomain;
  return `<p>${title} <span style="color:var(--text-muted);font-size:12px">${t.recordCount(count)}</span></p>
    <table>
      <thead><tr><th>IP</th><th>${nameLabel}</th><th>${colLabel}</th><th>${hitsLabel}</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── SLIDING WINDOW ────────────────────────────────────────
// Keeps the last N turns so as not to exceed the API context.
// A "turn" = 1 user message + 1 model message → MAX_TURNS * 2 entries.
const MAX_HISTORY_TURNS = 10;
function trimHistory() {
  const maxEntries = MAX_HISTORY_TURNS * 2;
  if (conversationHistory.length > maxEntries) {
    conversationHistory = conversationHistory.slice(-maxEntries);
  }
}

// ── API ────────────────────────────────────────────────────
async function callLLM(systemInstruction, history, attempt = 1) {
  const MAX_ATTEMPTS = 4;
  const RETRY_DELAYS = [4000, 8000, 15000];
  const RETRY_STATUSES = [429, 500, 502, 503, 504];

  const body = {
    system_instruction: { parts: [{ text: systemInstruction }] },
    contents: history,
    generationConfig: { temperature: 0.3, maxOutputTokens: 8192 },
  };

  let res;
  try {
    res = await fetch(
      'worker.php?action=llm_proxy',
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    } catch (networkErr) {
    if (attempt < MAX_ATTEMPTS) {
      const delay = RETRY_DELAYS[attempt - 1];
      const retryMsg = t.retryNoResponse(delay/1000, attempt, MAX_ATTEMPTS - 1);
      updateTypingText(retryMsg);
      await new Promise(r => setTimeout(r, delay));
      return callLLM(systemInstruction, history, attempt + 1);
    }
    throw networkErr;
  }

  if (RETRY_STATUSES.includes(res.status) && attempt < MAX_ATTEMPTS) {
    const delay = RETRY_DELAYS[attempt - 1];
    const busyMsg = t.retryBusy(res.status, delay/1000, attempt, MAX_ATTEMPTS - 1);
    updateTypingText(busyMsg);
    await new Promise(r => setTimeout(r, delay));
    return callLLM(systemInstruction, history, attempt + 1);
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }

  const data = await res.json();

  if (data.error) {
    if (attempt < MAX_ATTEMPTS) {
      const delay = RETRY_DELAYS[attempt - 1];
      const errorMsg = t.retryError(delay/1000, attempt, MAX_ATTEMPTS - 1);
      updateTypingText(errorMsg);
      await new Promise(r => setTimeout(r, delay));
      return callLLM(systemInstruction, history, attempt + 1);
    }
    throw new Error(data.error.message || 'Error en respuesta');
  }

  return data.candidates?.[0]?.content?.parts?.[0]?.text || t.noAnswer;
}


function updateTypingText(text) {
  const t = document.getElementById('typingMsg');
  if (t) t.querySelector('.bubble').innerHTML =
    `<div class="typing" style="gap:8px;font-size:12px;color:var(--text-muted);font-family:var(--mono)">${text}</div>`;
}

// ── SYSTEM PROMPT ─────────────────────────────────────────────────
function buildSystemPrompt(ragContext = '') {
  const base = systemPromptBase || 'You are SquidAI, a specialized assistant for Squid proxy logs and reports.';
  const restrictions = systemPromptRestrictions.length
    ? 'STRICT RESTRICTIONS / RESTRICCIONES ESTRICTAS:\n' + systemPromptRestrictions.join('\n')
    : '';
  return [base, t.langInstruction, ragContext, restrictions].filter(Boolean).join('\n\n');
}

// ── FORMAT AI REPLY ───────────────────────────────────────────────
function formatAIReply(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="font-family:var(--mono);font-size:11px;background:var(--surface2);padding:1px 5px;border-radius:3px;color:var(--accent)">$1</code>')
    .replace(/(⚠️\s*ALERTA:.+)/g, '<div class="alert-line">$1</div>')
    .replace(/(✅.+)/g, '<div class="ok-line">$1</div>')
    .split('\n\n').map(p => {
      if (p.includes('|')) return convertTable(p);
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).join('');
  return html;
}

function convertTable(text) {
  const lines = text.trim().split('\n').filter(l => l.includes('|'));
  if (lines.length < 2) return '<p>' + text + '</p>';
  const header = lines[0].split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
  const rows = lines.slice(2).map(l =>
    '<tr>' + l.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('') + '</tr>'
  ).join('');
  return `<table><tr>${header}</tr>${rows}</table>`;
}
