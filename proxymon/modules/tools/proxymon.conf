<VirtualHost *:18080>
    ServerName localhost
    DocumentRoot /var/www/proxymon
    
    Alias /proxymon /var/www/proxymon

    # General Config
    <Directory />
        Options FollowSymLinks
        DirectoryIndex index.php index.html index.htm
        Options +ExecCGI
        AllowOverride None

        # Protect sensitive file types across all proxymon subdirectories
        <FilesMatch "(?i)\.(env|ini|log|sh|sql|bak|backup|json|yaml|yml|key|pem|crt|conf)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ScriptAlias /cgi-bin/ /usr/lib/cgi-bin/
    <Directory "/usr/lib/cgi-bin">
        AllowOverride None
        Options +ExecCGI -MultiViews +SymLinksIfOwnerMatch
        Require all granted
    </Directory>

    # Lightsquid
    <Directory "/var/www/proxymon/lightsquid">
        DirectoryIndex index.cgi
        Options +ExecCGI +FollowSymLinks
        AddHandler cgi-script .cgi .pl
        AllowOverride None
        Require all granted
    </Directory>

    # Lightsquid assets
    Alias /proxymon/lightsquid/assets/ "/var/www/proxymon/lightsquid/assets/"
    Alias /proxymon/lightsquid/tpl/ "/var/www/proxymon/lightsquid/tpl/"
    Alias /proxymon/lightsquid/images/ "/var/www/proxymon/lightsquid/tpl/base/images/"

    # Squidmon
    <Directory "/var/www/proxymon/squidmon">
        DirectoryIndex index.cgi
        Options +ExecCGI +FollowSymLinks
        AddHandler cgi-script .cgi .pl
        AllowOverride None
        Require all granted
    </Directory>

    # Sarg
    Alias /proxymon/sarg/ "/var/www/proxymon/sarg/squid-reports/"
    <Directory "/var/www/proxymon/sarg/squid-reports">
        Options Indexes FollowSymLinks
        DirectoryIndex index.html
        AllowOverride None
        Require all granted
    </Directory>

    # Sqstat
    Alias /sqstat/ "/var/www/proxymon/sqstat/"
    <Directory "/var/www/proxymon/sqstat/">
        Options +ExecCGI +FollowSymLinks
        DirectoryIndex index.php sqstat.php
        AddHandler application/x-httpd-php .php
        AllowOverride None
        Require all granted
    </Directory>
    
    # SquidAnalyzer
    Alias /proxymon/squidanalyzer/ "/var/www/proxymon/squidanalyzer/output/"
    <Directory "/var/www/proxymon/squidanalyzer/output">
        DirectoryIndex index.html
        AllowOverride None
        Require all granted
    </Directory>

    Alias /proxymon/squidanalyzer/resources/ "/var/www/proxymon/squidanalyzer/resources/"
    <Directory "/var/www/proxymon/squidanalyzer/resources">
        AllowOverride None
        Require all granted
    </Directory>
    
    # Logview
    <Directory "/var/www/proxymon/logview">
        DirectoryIndex index.php
        Options +FollowSymLinks
        AddHandler application/x-httpd-php .php
        AllowOverride None
        Require all granted
    </Directory>
    
    # SquidAI
    Alias /squidai "/var/www/proxymon/squidai"
    <Directory "/var/www/proxymon/squidai">
        DirectoryIndex index.html
        Options +FollowSymLinks
        AddHandler application/x-httpd-php .php
        AllowOverride None
        Require all granted
    </Directory>

    SetEnvIf Request_URI "^/sqstat/sqstat\.php$" dontlog
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    ErrorLog ${APACHE_LOG_DIR}/proxymon_error.log
</VirtualHost>
