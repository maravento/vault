# /etc/pydhcp/pydhcpd.conf
# pydhcpd configuration — compatible with dhcpd.conf syntax
# Generated by pyleases.sh or edited manually

authoritative;
cleanup-interval 60;
server-identifier 192.168.0.1;
deny duplicates;
one-lease-per-client true;
deny declines;
deny client-updates;
ping-check true;
ddns-update-style none;

# WPAD (Web Proxy Auto-Discovery) — Option 252
# Uncomment BOTH lines below (this one and the one inside the subnet block)
# only if you have a working WPAD/PAC infrastructure.
#
# Requirements:
#   - A web server (e.g. Apache2) serving the PAC file on port 18100
#     Packages: apache2 apache2-utils apache2-dev apache2-suexec-pristine
#   - A PAC file (wpad.pac) deployed at the DocumentRoot (e.g. /var/www/wpad/)
#   - Apache VirtualHost configured for port 18100 (see wpad/wpad.conf)
#   - Port 18100 open in your firewall
#   - The URL must be reachable from all DHCP clients on the LAN
#
# Security note: plain HTTP exposes the PAC file to MITM on untrusted networks.
# Use HTTPS or restrict to trusted LAN segments.
#
# option wpad code 252 = text;

# Static host reservations (MAC → IP)
# host HOSTNAME {
#     hardware ethernet aa:bb:cc:dd:ee:ff;
#     fixed-address 192.168.0.X;
# }

# Blocked MACs — no IP is assigned at all (allocate() returns "deny members
# of blockdhcp" and the client is left unanswered)
class "blockdhcp" {
    match pick-first-value (option dhcp-client-identifier, hardware);
}
# subclass "blockdhcp" 1:aa:bb:cc:dd:ee:ff;

subnet 192.168.0.0 netmask 255.255.255.0 {
    option routers 192.168.0.1;
    option subnet-mask 255.255.255.0;
    option broadcast-address 192.168.0.255;
    option domain-name-servers 8.8.8.8,1.1.1.1;
    # option wpad "http://SERVER_IP:18100/wpad.pac";   # uncomment with option wpad code 252 above
    min-lease-time 2592000;
    default-lease-time 2592000;
    max-lease-time 2592000;
    # Pool for blocked/temporary clients — legitimate hosts must use fixed-address reservations above
    pool {
        min-lease-time 120;
        default-lease-time 120;
        max-lease-time 120;
        deny members of "blockdhcp";
        range 192.168.0.220 192.168.0.235;
    }
}
